name: macOS testing
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
# on: [push]
on: [workflow_dispatch]

jobs:
  Explore-GitHub-Actions:
    # runs-on: ubuntu-latest
    runs-on: macos-latest
    # probs change to macos-15 when im testing non-apple glass htingy
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v5
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - run: echo "🍏 This job's status is ${{ job.status }}."
      # implement VNC/RDP
      - name: do smt to make user yadda yadda
        run: |
            sudo dscl . -create /Users/madmin
            sudo dscl . -create /Users/madmin UserShell /bin/zsh
            sudo dscl . -create /Users/madmin RealName Very_real_name
            whoami
            sudo dscl . -create /Users/madmin RealName Runner_Admin
            sudo dscl . -create /Users/madmin UniqueID 1001
            sudo dscl . -create /Users/madmin PrimaryGroupID 80
            sudo dscl . -create /Users/madmin NFSHomeDirectory /Users/madmin
            sudo dscl . -passwd /Users/madmin password